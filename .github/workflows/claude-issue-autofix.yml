name: EOF Delimiter Injection PoC

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: read

jobs:
  autofix:
    name: Create approved auto-fix PR
    # 极简触发条件：正常 Issue 且评论为 /claude fix
    if: github.event.issue.pull_request == null && github.event.comment.body == '/claude fix'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch issue details (The Source)
        id: issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          # 使用 gh cli 和 jq 提取标题和正文，和原版一模一样
          TITLE=$(gh issue view "$ISSUE_NUMBER" --repo "${{ github.repository }}" --json title --jq .title)
          BODY=$(gh issue view "$ISSUE_NUMBER" --repo "${{ github.repository }}" --json body --jq .body)

          echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          
          echo "title<<EOF" >> "$GITHUB_OUTPUT"
          echo "$TITLE" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create fix branch (The Sink)
        id: branch
        run: |
          # 🚨 这里的 issue_number 如果被污染，双引号就会被闭合从而触发 RCE
          BRANCH_NAME="claude/fix-issue-${{ steps.issue.outputs.issue_number }}-run-${{ github.run_id }}"
          git checkout -b "$BRANCH_NAME"
          echo "branch=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
